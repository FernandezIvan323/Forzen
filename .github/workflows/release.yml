name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica FX)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: List target contents
        run: Get-ChildItem -LiteralPath target\*.jar

      - name: Get version
        id: version
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Create MSI with jpackage
        run: |
          jpackage --type msi `
            --input target `
            --main-jar forzen-${{ steps.version.outputs.VERSION }}-shaded.jar `
            --main-class com.forzen.App `
            --name Forzen `
            --app-version ${{ steps.version.outputs.VERSION }} `
            --vendor "Forzen Project" `
            --description "Screen magnifier for visually impaired users" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest target\installer `
            --java-options "--add-modules javafx.controls,javafx.swing"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Forzen-${{ github.ref_name }}-windows
          path: target\installer\*.msi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target\installer\*.msi
          generate_release_notes: true
