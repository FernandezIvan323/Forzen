name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Download JavaFX jmods
        run: |
          curl -L -o javafx-jmods.zip "https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_windows-x64_bin-jmods.zip"
          Expand-Archive -Path javafx-jmods.zip -DestinationPath .

      - name: Create runtime image with jlink
        run: |
          jlink --module-path "%JAVA_HOME%\jmods;javafx-jmods-21.0.6;target\forzen-1.1.0-shaded.jar" `
            --add-modules java.base,java.desktop,java.prefs,javafx.controls,javafx.swing `
            --output target\runtime --strip-debug --no-header-files --no-man-pages `
            --compress=2

      - name: Get version
        id: version
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Create MSI with jpackage
        run: |
          jpackage --type msi `
            --input target `
            --runtime-image target\runtime `
            --main-jar forzen-1.1.0-shaded.jar `
            --main-class com.forzen.App `
            --name Forzen `
            --app-version ${{ steps.version.outputs.VERSION }} `
            --vendor "Forzen Project" `
            --description "Screen magnifier for visually impaired users" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest target\installer

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Forzen-${{ github.ref_name }}-windows
          path: target\installer\*.msi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target\installer\*.msi
          generate_release_notes: true
