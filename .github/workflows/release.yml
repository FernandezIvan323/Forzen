name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica FX)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Release version: $v"

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Stage clean jpackage input
        id: stage
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $stage = "target/jpackage-input"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Prefer jar matching the tag; else any forzen-*.jar except original-/shaded name noise
          $candidates = @()
          if (Test-Path "target/forzen-$v.jar") {
            $candidates = @(Get-Item "target/forzen-$v.jar")
          }
          if (-not $candidates -or $candidates.Count -eq 0) {
            $candidates = Get-ChildItem target -Filter "forzen-*.jar" |
              Where-Object { $_.Name -notlike "original-*" -and $_.Name -notlike "*-shaded.jar" } |
              Sort-Object Length -Descending
          }
          if (-not $candidates -or $candidates.Count -eq 0) {
            Write-Host "Available jars:"
            Get-ChildItem target -Filter *.jar | ForEach-Object { $_.Name }
            throw "No forzen jar found in target/"
          }

          $src = $candidates[0]
          $mainJar = "forzen-$v.jar"
          Copy-Item $src.FullName (Join-Path $stage $mainJar)
          Write-Host "Staged $($src.Name) as $mainJar ($([math]::Round($src.Length/1MB,1)) MB)"
          echo "MAIN_JAR=$mainJar" >> $env:GITHUB_OUTPUT
          Get-ChildItem $stage | Format-Table Name, Length

      - name: Create EXE installer (wizard for end users)
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $mainJar = "${{ steps.stage.outputs.MAIN_JAR }}"
          $icon = "src/main/resources/icons/forzen.ico"
          $iconArgs = @()
          if (Test-Path $icon) { $iconArgs = @("--icon", $icon) }
          New-Item -ItemType Directory -Force -Path target/installer | Out-Null
          # B8E4F2C1-... must stay stable across releases (upgrade identity).
          jpackage `
            --type exe `
            --input target/jpackage-input `
            --main-jar $mainJar `
            --main-class com.forzen.App `
            --name Forzen `
            --app-version $v `
            --vendor "Forzen Project" `
            --description "Lupa de pantalla para baja vision" `
            --about-url "https://FernandezIvan323.github.io/Forzen/" `
            --dest target/installer `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group Forzen `
            --win-shortcut `
            --win-per-user-install `
            --win-upgrade-uuid "B8E4F2C1-9A3D-4E7B-8F1C-6D2A5E9B0C47" `
            --win-help-url "https://FernandezIvan323.github.io/Forzen/download.html" `
            --java-options "--add-modules=javafx.controls,javafx.swing" `
            @iconArgs
          Get-ChildItem target/installer -Filter *.exe | ForEach-Object {
            $dest = "target/installer/Forzen-Setup-$v.exe"
            if ($_.Name -ne "Forzen-Setup-$v.exe") {
              Move-Item $_.FullName $dest -Force
            }
          }

      - name: Create MSI installer (optional)
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $mainJar = "${{ steps.stage.outputs.MAIN_JAR }}"
          $icon = "src/main/resources/icons/forzen.ico"
          $iconArgs = @()
          if (Test-Path $icon) { $iconArgs = @("--icon", $icon) }
          jpackage `
            --type msi `
            --input target/jpackage-input `
            --main-jar $mainJar `
            --main-class com.forzen.App `
            --name Forzen `
            --app-version $v `
            --vendor "Forzen Project" `
            --description "Lupa de pantalla para baja vision" `
            --about-url "https://FernandezIvan323.github.io/Forzen/" `
            --dest target/installer `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group Forzen `
            --win-shortcut `
            --win-per-user-install `
            --win-upgrade-uuid "B8E4F2C1-9A3D-4E7B-8F1C-6D2A5E9B0C47" `
            --win-help-url "https://FernandezIvan323.github.io/Forzen/download.html" `
            --java-options "--add-modules=javafx.controls,javafx.swing" `
            @iconArgs
          Get-ChildItem target/installer -Filter *.msi | ForEach-Object {
            $dest = "target/installer/Forzen-Setup-$v.msi"
            if ($_.Name -ne "Forzen-Setup-$v.msi") {
              Move-Item $_.FullName $dest -Force
            }
          }

      - name: List installer outputs
        shell: pwsh
        run: Get-ChildItem target/installer | Format-Table Name, Length

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Forzen-${{ github.ref_name }}-windows
          path: |
            target/installer/Forzen-Setup-*.exe
            target/installer/Forzen-Setup-*.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/installer/Forzen-Setup-*.exe
            target/installer/Forzen-Setup-*.msi
          generate_release_notes: true
          body: |
            ## Forzen para Windows

            1. Descarga **Forzen-Setup-*.exe**
            2. Doble clic para abrir el asistente
            3. Si Windows pregunta por permisos, pulsa **Sí**
            4. Si aparece SmartScreen: **Más información** → **Ejecutar de todos modos**
            5. Listo — Forzen queda en el menú Inicio

            No necesitas instalar Java ni usar la terminal.
